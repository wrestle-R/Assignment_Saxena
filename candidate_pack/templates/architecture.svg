<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Mini Exception Inbox architecture</title>
  <desc id="desc">CSV files flow into raw tables, then clean tables, then exceptions and the dashboard, with data quality issues branching off the raw layer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8bcc6" />
    </marker>
    <style>
      .bg { fill: #faf9f5; }
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
      .sub { font: 400 15px Inter, Arial, sans-serif; fill: #5b6472; }
      .box { fill: #ffffff; stroke: #d7dbe3; stroke-width: 1.5; rx: 16; }
      .label { font: 600 16px Inter, Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #5b6472; }
      .line { stroke: #b8bcc6; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #ccd1da; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="520" />

  <text class="title" x="60" y="54">Mini Exception Inbox</text>
  <text class="sub" x="60" y="84">Raw CSVs stay intact, clean rows feed the rules, and the dashboard only shows reviewed results.</text>

  <rect class="box" x="60" y="130" width="190" height="78" rx="16" />
  <text class="label" x="155" y="164" text-anchor="middle">CSV inputs</text>
  <text class="small" x="155" y="187" text-anchor="middle">production_plan + actual_production</text>

  <rect class="box" x="320" y="130" width="230" height="78" rx="16" />
  <text class="label" x="435" y="164" text-anchor="middle">Raw rows</text>
  <text class="small" x="435" y="187" text-anchor="middle">raw_plan_rows / raw_actual_rows</text>

  <rect class="box" x="620" y="130" width="230" height="78" rx="16" />
  <text class="label" x="735" y="164" text-anchor="middle">Clean rows</text>
  <text class="small" x="735" y="187" text-anchor="middle">clean_plan_records / clean_actual_records</text>

  <rect class="box" x="920" y="130" width="160" height="78" rx="16" />
  <text class="label" x="1000" y="164" text-anchor="middle">API</text>
  <text class="small" x="1000" y="187" text-anchor="middle">Express + JWT</text>

  <rect class="box" x="1120" y="130" width="140" height="78" rx="16" />
  <text class="label" x="1190" y="164" text-anchor="middle">Dashboard</text>
  <text class="small" x="1190" y="187" text-anchor="middle">React + Query</text>

  <rect class="box" x="620" y="310" width="240" height="90" rx="16" />
  <text class="label" x="740" y="346" text-anchor="middle">Exceptions</text>
  <text class="small" x="740" y="369" text-anchor="middle">matched rows below the threshold</text>

  <rect class="box" x="920" y="310" width="240" height="90" rx="16" />
  <text class="label" x="1040" y="346" text-anchor="middle">Data quality issues</text>
  <text class="small" x="1040" y="369" text-anchor="middle">duplicates, blanks, unmatched rows</text>

  <path class="line" d="M 250 169 L 320 169" />
  <path class="line" d="M 550 169 L 620 169" />
  <path class="line" d="M 850 169 L 920 169" />
  <path class="line" d="M 1080 169 L 1120 169" />

  <path class="line-soft" d="M 735 208 L 735 310" />
  <path class="line-soft" d="M 1000 208 L 1000 310" />

  <path class="line-soft" d="M 550 169 C 600 169, 600 345, 620 345" />
  <path class="line-soft" d="M 550 169 C 650 169, 820 345, 920 345" />

  <text class="sub" x="60" y="468">The clean layer is the only one used for matching. Anything suspicious stays visible in data-quality issues instead of being mixed into the exception math.</text>
</svg>

